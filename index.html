<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toko Sembako Bu Daryono — Papan Stok</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: #FBF6EC; color: #2B2418; min-height: 100vh; padding-bottom: 60px; }
  .disp { font-family: 'Fraunces', Georgia, serif; }
  .btn { cursor: pointer; border: none; transition: transform .12s ease, opacity .12s ease, box-shadow .15s ease; }
  .btn:active { transform: scale(0.97); }
  input, textarea { font-family: 'Inter', Arial, sans-serif; }
  input:focus, textarea:focus { border-color: #2F5B4C !important; box-shadow: 0 0 0 3px rgba(47,91,76,0.14); }

  .header-wrap { position: sticky; top: 0; z-index: 40; padding: 26px 32px; }
  .header-inner { display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap; }
  .brand-row { display: flex; align-items: center; gap: 14px; }
  .brand-title { font-size: 34px; }
  .tagline { font-size: 14.5px; }
  .admin-btn { padding: 10px 18px; font-size: 13.5px; }
  .page-body { padding: 28px 32px 48px; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .product-card { transition: box-shadow .18s ease, transform .18s ease; }
  .product-card:hover { box-shadow: 0 8px 22px rgba(29,60,49,0.10); transform: translateY(-2px); }
  .photo-box { height: 150px; }

  .overlay { position: fixed; inset: 0; background: rgba(30,26,15,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay-card { background: #fff; border-radius: 16px; padding: 26px 24px; width: 100%; max-width: 380px; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 40px rgba(0,0,0,0.22); }

  @media (max-width: 680px) {
    .header-wrap { padding: 18px 18px 20px; position: static; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 14px; }
    .brand-title { font-size: 25px; }
    .tagline { font-size: 13px; }
    .admin-btn { width: 100%; text-align: center; padding: 11px 16px; }
    .page-body { padding: 18px 16px 40px; }
    .add-btn { width: 100%; }
    .products-grid { grid-template-columns: 1fr; gap: 14px; }
    .photo-box { height: 170px; }
    .overlay-card { padding: 20px 18px; max-width: 100%; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
const PALETTE = {
  bg: "#FBF6EC", ink: "#2B2418", card: "#FFFFFF", border: "#E7DDC8",
  green: "#2F5B4C", greenDark: "#1D3C31", navy: "#15304B", navyDeep: "#0D2033",
  mustard: "#D99A2B", mustardDark: "#8C5F13", rust: "#B24A2B", rustDark: "#6E2C17", muted: "#7A7160"
};

// Dibuat default array kosong [] agar tidak stuck di mode loading jika bermasalah
let products = [];
let isAdmin = false;
let showAdminEntry = false;
let editingId = null;
let currentPhoto = "";
let logoTapCount = 0;
let logoTapTimer = null;
let storageOk = true;

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function currency(n) {
  const num = Number(n) || 0;
  return "Rp " + num.toLocaleString("id-ID");
}

function formatRibuan(digits) {
  if (!digits) return "";
  return Number(digits).toLocaleString("id-ID");
}

function stockBadgeHtml(stock) {
  const s = Number(stock);
  let label, bg, fg;
  if (s <= 0) { label = "HABIS"; bg = PALETTE.rust; fg = "#FCEBE3"; }
  else if (s <= 3) { label = "SISA " + s; bg = PALETTE.mustard; fg = PALETTE.mustardDark; }
  else { label = "TERSEDIA"; bg = PALETTE.green; fg = "#E7F2EC"; }
  return `<span style="display:inline-block;font-family:Georgia,serif;font-weight:700;font-size:12px;letter-spacing:0.06em;padding:4px 10px;border-radius:3px;background:${bg};color:${fg};transform:rotate(-2deg);border:1px solid ${bg};">${label}</span>`;
}

function showToast(msg) {
  const root = document.getElementById("toastRoot");
  root.innerHTML = `<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${PALETTE.greenDark};color:#F3EEDD;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,0.18);z-index:60;">${escapeHtml(msg)}</div>`;
  setTimeout(() => { root.innerHTML = ""; }, 2200);
}

async function loadAll() {
  try {
    const p = localStorage.getItem("products");
    products = p ? JSON.parse(p) : [];
  } catch (e) {
    storageOk = false;
    products = [];
  }
  renderMain();
}

async function saveProducts(list) {
  products = list;
  renderMain();
  try {
    localStorage.setItem("products", JSON.stringify(list));
  } catch (e) {
    showToast("Gagal menyimpan data.");
  }
}

function checkHash() {
  if (window.location && window.location.hash === "#admin") {
    showAdminEntry = true;
    renderMain();
  }
}

function handleLogoTap() {
  if (showAdminEntry) return;
  logoTapCount += 1;
  if (logoTapTimer) clearTimeout(logoTapTimer);
  if (logoTapCount >= 5) {
    showAdminEntry = true;
    logoTapCount = 0;
    renderMain();
    return;
  }
  logoTapTimer = setTimeout(() => { logoTapCount = 0; }, 1200);
}

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    renderMain();
  } else {
    openLoginModal();
  }
}

function closeLoginModal() {
  document.getElementById("modalRoot").innerHTML = "";
}

function openLoginModal() {
  const modalRoot = document.getElementById("modalRoot");
  modalRoot.innerHTML = `
    <div class="overlay" id="loginOverlay">
      <div class="overlay-card" onclick="event.stopPropagation()">
        <h2 class="disp" style="margin:0 0 4px;font-size:20px;">Masuk sebagai admin</h2>
        <p style="margin:0 0 16px;font-size:13px;color:${PALETTE.muted};">Masukkan kata sandi untuk mengelola stok.</p>
        <input id="pwInput" type="password" placeholder="Kata sandi admin" style="${inputStyleStr()}" />
        <p id="loginErr" style="${errStyleStr()};display:none;"></p>
        <button class="btn" onclick="handleLogin()" style="${primaryBtnStr()};margin-top:10px;">Masuk</button>
      </div>
    </div>`;
  document.getElementById("loginOverlay").addEventListener("click", closeLoginModal);
  const pwInput = document.getElementById("pwInput");
  pwInput.focus();
  pwInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleLogin(); });
}

function showLoginErr(msg) {
  const el = document.getElementById("loginErr");
  if (el) { el.textContent = msg; el.style.display = "block"; }
}

async function handleLogin() {
  const pwInput = document.getElementById("pwInput").value;
  if (pwInput === "Daryono756585") {
    isAdmin = true;
    closeLoginModal();
    renderMain();
    showToast("Berhasil masuk sebagai admin.");
  } else {
    showLoginErr("Kata sandi salah.");
  }
}

function closeFormModal() {
  document.getElementById("modalRoot").innerHTML = "";
  currentPhoto = "";
  editingId = null;
}

function openAddForm() {
  editingId = null;
  currentPhoto = "";
  renderFormModal({ name: "", price: "", stock: "", photo: "", desc: "" });
}

function openEditForm(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  editingId = id;
  currentPhoto = p.photo || "";
  renderFormModal({ name: p.name, price: String(p.price), stock: String(p.stock), photo: p.photo || "", desc: p.desc || "" });
}

function fieldHtml(label, inner) {
  return `<label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:${PALETTE.muted};font-weight:600;">${label}${inner}</label>`;
}

function renderFormModal(data) {
  const modalRoot = document.getElementById("modalRoot");
  modalRoot.innerHTML = `
    <div class="overlay" id="formOverlay">
      <div class="overlay-card" onclick="event.stopPropagation()">
        <h2 class="disp" style="margin:0 0 16px;font-size:20px;">${editingId ? "Edit barang" : "Tambah barang"}</h2>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${fieldHtml("Nama barang", `<input id="f-name" style="${inputStyleStr()}" placeholder="Contoh: Beras 5kg" />`)}
          ${fieldHtml("Harga (Rp)", `<input id="f-price" type="text" inputmode="numeric" style="${inputStyleStr()}" placeholder="10.000" />`)}
          ${fieldHtml("Jumlah stok", `<input id="f-stock" type="number" style="${inputStyleStr()}" placeholder="20" />`)}
          ${fieldHtml("Foto produk", `
            <input id="f-photo-file" type="file" accept="image/*" style="${inputStyleStr()};padding:8px 10px;" />
            <div id="photoPreviewWrap"></div>
            <p style="font-size:11.5px;color:${PALETTE.muted};margin:8px 0 2px;">Atau tempel tautan foto (opsional):</p>
            <input id="f-photo-url" style="${inputStyleStr()}" placeholder="https://..." />
          `)}
          ${fieldHtml("Deskripsi singkat (opsional)", `<textarea id="f-desc" style="${inputStyleStr()};min-height:60px;resize:vertical;" placeholder="Kualitas terjamin, harga bersaing"></textarea>`)}
        </div>
        <div style="display:flex;gap:8px;margin-top:18px;">
          <button class="btn" onclick="handleSaveForm()" style="${primaryBtnStr()}">Simpan</button>
          <button class="btn" onclick="closeFormModal()" style="${pillBtnStr(false)}">Batal</button>
        </div>
      </div>
    </div>`;
  document.getElementById("formOverlay").addEventListener("click", closeFormModal);

  document.getElementById("f-name").value = data.name;
  document.getElementById("f-price").value = formatRibuan(data.price);
  document.getElementById("f-stock").value = data.stock;
  document.getElementById("f-desc").value = data.desc;
  document.getElementById("f-photo-url").value = data.photo && data.photo.startsWith("data:") ? "" : data.photo;

  document.getElementById("f-price").addEventListener("input", (e) => {
    const digits = e.target.value.replace(/\D/g, "");
    e.target.value = formatRibuan(digits);
  });

  document.getElementById("f-photo-file").addEventListener("change", handlePhotoFile);
  document.getElementById("f-photo-url").addEventListener("input", (e) => {
    currentPhoto = e.target.value;
    renderPhotoPreview();
  });

  renderPhotoPreview();
}

function renderPhotoPreview() {
  const wrap = document.getElementById("photoPreviewWrap");
  if (!wrap) return;
  if (currentPhoto) {
    wrap.innerHTML = `
      <div style="margin-top:8px;display:flex;align-items:center;gap:10px;">
        <img src="${currentPhoto}" alt="Pratinjau foto" style="width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid ${PALETTE.border};" />
        <button type="button" class="btn" onclick="clearPhoto()" style="${pillBtnStr(true)}">Hapus foto</button>
      </div>`;
  } else {
    wrap.innerHTML = "";
  }
}

function clearPhoto() {
  currentPhoto = "";
  const urlInput = document.getElementById("f-photo-url");
  if (urlInput) urlInput.value = "";
  renderPhotoPreview();
}

function handlePhotoFile(e) {
  const file = e.target.files && e.target.files[0];
  e.target.value = "";
  if (!file) return;
  if (!file.type.startsWith("image/")) { showToast("File harus berupa gambar."); return; }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const maxDim = 640;
      let width = img.width, height = img.height;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
        else { width = Math.round(width * maxDim / height); height = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      currentPhoto = canvas.toDataURL("image/jpeg", 0.72);
      const urlInput = document.getElementById("f-photo-url");
      if (urlInput) urlInput.value = "";
      renderPhotoPreview();
    };
    img.onerror = () => showToast("Gagal membaca gambar.");
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function handleSaveForm() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { showToast("Nama barang wajib diisi."); return; }
  const priceDigits = document.getElementById("f-price").value.replace(/\D/g, "");
  const stock = document.getElementById("f-stock").value;
  const desc = document.getElementById("f-desc").value.trim();
  const photo = currentPhoto.trim();

  // PERBAIKAN: Membaca array secara aman agar tidak eror saat data kosong
  const list = products && Array.isArray(products) ? [...products] : [];
  
  if (editingId) {
    const idx = list.findIndex((p) => p.id === editingId);
    if (idx >= 0) {
      list[idx] = { ...list[idx], name, price: Number(priceDigits) || 0, stock: Number(stock) || 0, photo, desc };
    }
  } else {
    list.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      name, price: Number(priceDigits) || 0, stock: Number(stock) || 0, photo, desc
    });
  }
  await saveProducts(list);
  closeFormModal();
  showToast(editingId ? "Barang diperbarui." : "Barang ditambahkan.");
}

async function handleDelete(id) {
  const list = products.filter((p) => p.id !== id);
  await saveProducts(list);
  showToast("Barang dihapus.");
}

async function quickStock(id, delta) {
  const list = products.map((p) => p.id === id ? { ...p, stock: Math.max(0, Number(p.stock) + delta) } : p);
  await saveProducts(list);
}

function inputStyleStr() {
  return `width:100%;padding:10px 12px;border-radius:8px;border:1px solid ${PALETTE.border};font-size:14px;outline:none;background:#FDFBF5;color:${PALETTE.ink};`;
}
function primaryBtnStr() {
  return `background:${PALETTE.green};color:#EAF1EC;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;width:100%;box-shadow:0 2px 8px rgba(47,91,76,0.25);`;
}
function pillBtnStr(danger) {
  return `background:${danger ? "#FBEAE4" : "#F1EEE0"};color:${danger ? PALETTE.rustDark : PALETTE.greenDark};border:none;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;`;
}
function errStyleStr() {
  return `color:${PALETTE.rustDark};font-size:12px;margin:8px 0 0;`;
}

function logoSvg() {
  return `<svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 20L24 8L42 20" stroke="#1B4E7A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="9" y="19" width="30" height="21" rx="1.5" fill="#BFDCF2" stroke="#1B4E7A" stroke-width="2.5" />
    <rect x="7" y="17" width="34" height="6" rx="1.5" fill="#3E7CB1" stroke="#1B4E7A" stroke-width="2" />
    <path d="M9 23L11 17M17 23L18.5 17M25 23L26 17M33 23L34.5 17M41 23L39 17" stroke="#1B4E7A" stroke-width="1.6" stroke-linecap="round" />
    <rect x="20.5" y="28" width="7" height="12" fill="#1B4E7A" />
    <rect x="12.5" y="26" width="5.5" height="5.5" rx="0.5" fill="#FFFFFF" stroke="#1B4E7A" stroke-width="1.6" />
    <rect x="30" y="26" width="5.5" height="5.5" rx="0.5" fill="#FFFFFF" stroke="#1B4E7A" stroke-width="1.6" />
  </svg>`;
}

function whatsappSvg() {
  return `<svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 4C9.373 4 4 9.373 4 16c0 2.34.667 4.523 1.822 6.377L4 28l5.78-1.783A11.93 11.93 0 0016 28
